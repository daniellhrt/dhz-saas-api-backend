spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  docker:
    compose:
      enabled: false # Em produção, a orquestração é externa

logging:
  level:
    root: INFO
    br.com.dht.apibackend: INFO
