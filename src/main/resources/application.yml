# Arquivo: src/main/resources/application.yml
spring:
  application:
    name: dhz-saas-api-backend
  profiles:
    active: dev

app:
  security:
    jwt:
      secret: ${JWT_SECRET}
      expiration-ms: 86400000

---
spring:
  config:
    activate:
      on-profile: dev
  docker:
    compose:
      enabled: true
      lifecycle-management: start-and-stop
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

---
spring:
  config:
    activate:
      on-profile: prod
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379