# Arquivo: src/main/resources/application.yml
server:
  port: ${PORT:8080}

spring:
  application:
    name: dhz-saas-api-backend
  profiles:
    active: dev

app:
  security:
    jwt:
      secret: ${JWT_SECRET:minha-chave-secreta-padrao-jwt-256-bits-minimo}
      expiration-ms: 86400000

---
spring:
  config:
    activate:
      on-profile: dev
  docker:
    compose:
      enabled: true
      lifecycle-management: start-and-stop
  data:
    redis:
      host: ${REDISHOST:${REDIS_HOST:localhost}}
      port: ${REDISPORT:${REDIS_PORT:6379}}
      password: ${REDISPASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

---
spring:
  config:
    activate:
      on-profile: prod
  data:
    redis:
      host: ${REDISHOST:${REDIS_HOST:localhost}}
      port: ${REDISPORT:${REDIS_PORT:6379}}
      password: ${REDISPASSWORD:}